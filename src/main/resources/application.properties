spring.application.name=textextracter
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
spring.profiles.active=${PROFILE}
thirdeye.resume.updater.api.key=${THIRDEYE_RESUME_UPDATER_API_KEY}
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true
thirdeye.timezone = Asia/Kolkata

thirdeye.maximumqueries=5
thirdeye.messagebroker.topics.textextracter.topicName=textextracter
thirdeye.messagebroker.topics.textextracter.topicKey=${TEXTEXTRACTER_KEY}
thirdeye.messagebroker.topics.aiprocesser.topicName=aiprocesser
thirdeye.messagebroker.topics.aiprocesser.topicKey=${AI_PROCESSER_KEY}
thirdeye.messagebroker.topics.statusupdater.topicName=statusupdater
thirdeye.messagebroker.topics.statusupdater.topicKey=${STATUS_UPDATER_KEY}
thirdeye.messagebroker.topics.mailprocesser.topicName=mailprocesser
thirdeye.messagebroker.topics.mailprocesser.topicKey=${MAIL_PROCESSER_KEY}
thirdeye.message.broker.read.rate=10000
thirdeye.mail.apikey=${THIRDEYE_MAIL_API_KEY}

spring.cloud.aws.credentials.access-key=${AWS_ACCESS_KEY}
spring.cloud.aws.credentials.secret-key=${AWS_SECRET_KEY}
spring.cloud.aws.region.static=ap-south-1
thirdeye.bucket.name=${AWS_BUCKET_NAME}
